<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapidAid Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: #0D0E12;
  color: #EDEEF2;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-wrap {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin-bottom: 32px;
}
.logo-mark {
  width: 44px; height: 44px;
  background: #E8312A;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 20px rgba(232,49,42,0.4);
}
.logo-text h1 { font-size: 22px; font-weight: 800; }
.logo-text p  { font-size: 12px; color: #565C7A; }
.login-box {
  background: #191B23;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 32px;
}
.login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.login-box p  { font-size: 13px; color: #9EA3B8; margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px; font-weight: 600;
  color: #9EA3B8; text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 6px;
}
.field input {
  width: 100%; padding: 11px 14px;
  background: #21232E;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  color: #EDEEF2;
  font-family: 'Outfit', sans-serif;
  font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: #E8312A; }
.error {
  background: rgba(232,49,42,0.1);
  border: 1px solid rgba(232,49,42,0.25);
  color: #FF6B6B;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
.btn-login {
  width: 100%; padding: 13px;
  background: #E8312A; border: none;
  border-radius: 11px; color: white;
  font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.btn-login:hover { background: #C02020; }
.back-link {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: #565C7A;
}
.back-link a { color: #9EA3B8; text-decoration: none; }
.back-link a:hover { color: #EDEEF2; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-mark">🚑</div>
    <div class="logo-text">
      <h1>RapidAid</h1>
      <p>Admin Panel</p>
    </div>
  </div>
  <div class="login-box">
    <h2>Admin Login</h2>
    <p>Enter your admin credentials to continue</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autofocus />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-login">Login to Admin Panel</button>
    </form>
    <div class="back-link">
      <a href="/">← Back to RapidAid</a>
    </div>
  </div>
</div>
</body>
</html>
