databases:
  - name: rapidaid_db
    databaseName: rapidaid_db
    user: rapidaid_user
    plan: free
    region: frankfurt

services:
  - type: web
    name: rapidaid
    env: python
    region: frankfurt # Optional, you can pick ohio, oregon, etc.
    plan: free # Can be changed depending on needs
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: rapidaid_db
          property: connectionString
      - key: HF_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SECRET_KEY
        generateValue: true
